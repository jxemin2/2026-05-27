<!DOCTYPE html>
<html lang="ko">

<head>

  <!-- 한글 깨짐 방지 -->
  <meta charset="UTF-8">

  <!-- 모바일 화면 크기 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>투자 성향 테스트</title>

  <style>

    /* 전체 페이지 스타일 */
    body {

      background-color: #121212;

      color: white;

      font-family: Arial, sans-serif;

      margin: 0;

      padding: 30px;
    }

    /* 전체 박스 */
    .container {

      max-width: 700px;

      margin: auto;

      background-color: #1e1e1e;

      padding: 30px;

      border-radius: 15px;
    }

    /* 제목 */
    h1 {

      text-align: center;

      color: #00d084;

      margin-bottom: 40px;
    }

    /* 질문 박스 */
    .question {

      background-color: #2a2a2a;

      padding: 20px;

      margin-bottom: 25px;

      border-radius: 10px;
    }

    /* 질문 제목 */
    .question h3 {

      margin-bottom: 15px;
    }

    /* 라디오 버튼 설명 */
    label {

      display: block;

      margin-bottom: 10px;

      cursor: pointer;
    }

    /* 라디오 버튼 */
    input[type="radio"] {

      margin-right: 10px;
    }

    /* 결과 버튼 */
    button {

      width: 100%;

      padding: 15px;

      background-color: #00d084;

      border: none;

      border-radius: 10px;

      font-size: 18px;

      cursor: pointer;
    }

    /* 버튼 마우스 올렸을 때 */
    button:hover {

      background-color: #00ffae;
    }

    /* 결과 출력 박스 */
    #result {

      margin-top: 40px;

      padding: 20px;

      background-color: #2a2a2a;

      border-radius: 10px;

      text-align: center;

      font-size: 24px;

      font-weight: bold;

      display: none;
    }

  </style>

</head>

<body>

  <!-- 전체 내용을 담는 박스 -->
  <div class="container">

    <!-- 제목 -->
    <h1>투자 성향 테스트</h1>

    <!-- 질문 1 -->
    <div class="question">

      <h3>1. 투자 시 가장 중요한 것은?</h3>

      <label>
        <input type="radio" name="q1" value="1">
        원금 보존
      </label>

      <label>
        <input type="radio" name="q1" value="2">
        안정적 수익
      </label>

      <label>
        <input type="radio" name="q1" value="3">
        높은 수익률
      </label>

    </div>

    <!-- 질문 2 -->
    <div class="question">

      <h3>2. 주가가 급락하면?</h3>

      <label>
        <input type="radio" name="q2" value="1">
        바로 매도
      </label>

      <label>
        <input type="radio" name="q2" value="2">
        상황 지켜보기
      </label>

      <label>
        <input type="radio" name="q2" value="3">
        추가 매수
      </label>

    </div>

    <!-- 질문 3 -->
    <div class="question">

      <h3>3. 투자 가능 기간은?</h3>

      <label>
        <input type="radio" name="q3" value="1">
        1년 이하
      </label>

      <label>
        <input type="radio" name="q3" value="2">
        1~3년
      </label>

      <label>
        <input type="radio" name="q3" value="3">
        3년 이상
      </label>

    </div>

    <!-- 질문 4 -->
    <div class="question">

      <h3>4. 선호하는 투자 상품은?</h3>

      <label>
        <input type="radio" name="q4" value="1">
        예금 / 채권
      </label>

      <label>
        <input type="radio" name="q4" value="2">
        ETF
      </label>

      <label>
        <input type="radio" name="q4" value="3">
        성장주
      </label>

    </div>

    <!-- 질문 5 -->
    <div class="question">

      <h3>5. 손실 발생 시 대처는?</h3>

      <label>
        <input type="radio" name="q5" value="1">
        바로 정리
      </label>

      <label>
        <input type="radio" name="q5" value="2">
        일부 유지
      </label>

      <label>
        <input type="radio" name="q5" value="3">
        추가 투자
      </label>

    </div>

    <!-- 질문 6 -->
    <div class="question">

      <h3>6. 투자 경험은?</h3>

      <label>
        <input type="radio" name="q6" value="1">
        거의 없음
      </label>

      <label>
        <input type="radio" name="q6" value="2">
        조금 있음
      </label>

      <label>
        <input type="radio" name="q6" value="3">
        매우 많음
      </label>

    </div>

    <!-- 질문 7 -->
    <div class="question">

      <h3>7. 원하는 연 수익률은?</h3>

      <label>
        <input type="radio" name="q7" value="1">
        5% 이하
      </label>

      <label>
        <input type="radio" name="q7" value="2">
        10% 정도
      </label>

      <label>
        <input type="radio" name="q7" value="3">
        20% 이상
      </label>

    </div>

    <!-- 질문 8 -->
    <div class="question">

      <h3>8. 투자 정보는 어디서 얻나요?</h3>

      <label>
        <input type="radio" name="q8" value="1">
        뉴스 / 은행
      </label>

      <label>
        <input type="radio" name="q8" value="2">
        유튜브 / 커뮤니티
      </label>

      <label>
        <input type="radio" name="q8" value="3">
        직접 분석
      </label>

    </div>

    <!-- 질문 9 -->
    <div class="question">

      <h3>9. 투자 성향은?</h3>

      <label>
        <input type="radio" name="q9" value="1">
        안전 우선
      </label>

      <label>
        <input type="radio" name="q9" value="2">
        균형 투자
      </label>

      <label>
        <input type="radio" name="q9" value="3">
        공격 투자
      </label>

    </div>

    <!-- 질문 10 -->
    <div class="question">

      <h3>10. 여유 자금 비중은?</h3>

      <label>
        <input type="radio" name="q10" value="1">
        10% 이하
      </label>

      <label>
        <input type="radio" name="q10" value="2">
        30% 정도
      </label>

      <label>
        <input type="radio" name="q10" value="3">
        절반 이상
      </label>

    </div>

    <!-- 결과 보기 버튼 -->
    <button id="resultButton">결과 보기</button>

    <!-- 결과 출력 공간 -->
    <div id="result"></div>

  </div>

  <script>

    // 결과 보기 버튼 가져오기
    let button = document.getElementById("resultButton");

    // 버튼 클릭 시 실행
    button.onclick = function () {

      // 총 점수 저장 변수
      let total = 0;

      // 질문 1번부터 10번까지 반복
      for (let i = 1; i <= 10; i++) {

        // 현재 질문에서 선택된 radio 버튼 가져오기
        let answer = document.querySelector(
          'input[name="q' + i + '"]:checked'
        );

        // 답을 선택하지 않았을 경우
        if (answer == null) {

          alert(i + "번 질문에 답해주세요!");

          return;
        }

        // 선택한 점수를 total에 더하기
        total = total + Number(answer.value);
      }

      // 결과 출력 박스 가져오기
      let result = document.getElementById("result");

      // 결과 박스 보이기
      result.style.display = "block";

      // 안정형
      if (total <= 15) {

        result.innerHTML =
          "-안정형 투자자- <br><br>" +
          "안정적인 투자를 선호합니다.<br>" +
          "원금 보존을 중요하게 생각합니다.<br><br>" +
          "총 점수 : " + total + "점" +
            // a 태그로 페이지 이동
          "<a href='과제.html'>" +

          // 버튼처럼 보이게 만들 버튼
          "<button>모의 투자 하러가기</button>" +

          "</a>";
      }

      // 중립형
      else if (total <= 23) {

        result.innerHTML =
          "-중립형 투자자- <br><br>" +
          "안정성과 수익성을 균형 있게 추구합니다.<br>" +
          "적당한 위험 감수가 가능합니다.<br><br>" +
          "총 점수 : " + total + "점" +
            // a 태그로 페이지 이동
          "<a href='과제.html'>" +

          // 버튼처럼 보이게 만들 버튼
          "<button>모의 투자 하러가기</button>" +

          "</a>";
      }

      // 공격형
      else {

        result.innerHTML =
          "-공격형 투자자- <br><br>" +
          "높은 수익을 목표로 합니다.<br>" +
          "위험 감수가 가능합니다.<br><br>" +
          "총 점수 : " + total + "점" +

          // a 태그로 페이지 이동
          "<a href='과제.html'>" +

          // 버튼처럼 보이게 만들 버튼
          "<button>모의 투자 하러가기</button>" +

          "</a>";
        }

    };

  </script>

</body>

</html>
